name: Daily Capture
on:
  schedule:
    - cron: '0 20 * * *'  # runs every day at 3pm UTC
  workflow_dispatch:
jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
      - run: npm install playwright
      - run: npm install playwright-extra puppeteer-extra-plugin-stealth
      - run: npx playwright install chromium
      - run: mkdir -p output && node capture.js
      - run: |
          git config user.email "bot@example.com"
          git config user.name "Bot"
          git add output/
          git diff --staged --quiet || (git commit -m "Daily capture $(date)" && git pull --rebase && git push)
